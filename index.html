<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>March Madness · Scores</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #eef2ff;
      --card:      #ffffff;
      --card-hover:#f0f4ff;
      --border:    #c8d4f0;
      --blue:      #1a237e;
      --blue2:     #1565c0;
      --live:      #e53935;
      --live-bg:   #fff5f5;
      --final:     #78909c;
      --gold:      #f9a825;
      --orange:    #e65100;
      --text:      #0d1440;
      --muted:     #546e8a;
      --score:     #1a237e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--blue);
      border-bottom: 4px solid var(--gold);
      padding: 7px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 900;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
    }

    .brand span { color: var(--gold); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--live);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 2px;
      text-transform: uppercase;
    }

    .live-dot {
      width: 5px; height: 5px;
      background: #fff;
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .refresh-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.25); }

    .countdown {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.6);
      font-variant-numeric: tabular-nums;
      min-width: 24px;
    }

    /* ── TICKER TAB — ESPN-style ── */
    #ticker-view {
      display: none;
      flex-direction: column;
      background: #005555;
      min-height: calc(100vh - 70px);
    }

    /* ESPN-style single scrolling band */
    .espn-band {
      display: flex;
      align-items: stretch;
      overflow: hidden;
      height: 60px;
      border-bottom: 3px solid #cc0000;
    }

    .espn-band + .espn-band {
      border-top: 1px solid #007777;
      border-bottom: none;
      height: 48px;
    }

    .espn-tag {
      background: #cc0000;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      flex-shrink: 0;
      line-height: 1.1;
      min-width: 56px;
    }

    .espn-tag.upcoming-tag {
      background: #007777;
      font-size: 0.6rem;
    }

    .espn-tag .tag-sub {
      font-size: 0.5rem;
      font-weight: 700;
      opacity: 0.8;
      letter-spacing: 0.05em;
    }

    .espn-scroll {
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
      background: #111;
    }

    .espn-inner {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      animation: tk-scroll 35s linear infinite;
    }

    .espn-inner:hover { animation-play-state: paused; }

    @keyframes tk-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Live game chip */
    .espn-game {
      display: inline-flex;
      align-items: center;
      padding: 0 24px 0 16px;
      gap: 10px;
      border-right: 1px solid #444;
    }

    .espn-teams {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .espn-team-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.85rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Arial Narrow', 'Segoe UI', sans-serif;
    }

    .espn-seed {
      font-size: 0.6rem;
      color: #888;
      min-width: 12px;
      text-align: right;
    }

    .espn-abbr {
      font-weight: 700;
      color: #bbb;
      min-width: 38px;
      letter-spacing: 0.03em;
    }

    .espn-score {
      font-size: 1rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      min-width: 26px;
      text-align: right;
      color: #777;
    }

    .espn-team-row.winning .espn-abbr  { color: #ffffff; }
    .espn-team-row.winning .espn-score { color: #ffffff; font-size: 1.1rem; }
    .espn-team-row.losing  .espn-abbr  { color: #888; }
    .espn-team-row.losing  .espn-score { color: #888; }

    .espn-game.upset .espn-team-row.winning .espn-score { color: #f9a825; }
    .espn-game.upset .espn-team-row.winning .espn-abbr  { color: #f9a825; }

    .espn-status {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 2px;
      min-width: 52px;
    }

    .espn-clock {
      font-size: 0.72rem;
      color: #ff4444;
      font-weight: 800;
      white-space: nowrap;
    }

    .espn-period {
      font-size: 0.62rem;
      color: #aaa;
      white-space: nowrap;
      font-weight: 600;
    }

    /* Upcoming chip */
    .espn-up-game {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 24px 0 16px;
      border-right: 1px solid #444;
      font-size: 0.82rem;
    }

    .espn-up-teams {
      color: #ddd;
      font-weight: 700;
    }

    .espn-up-teams .at { color: #888; margin: 0 4px; font-weight: 400; }

    .espn-up-time {
      font-size: 0.68rem;
      color: #aaa;
      white-space: nowrap;
    }

    /* ── TOP PERFORMERS band ── */
    .tp-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 22px 0 14px;
      border-right: 1px solid #444;
      white-space: nowrap;
    }
    .tp-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: #fff;
    }
    .tp-team {
      font-size: 0.7rem;
      color: #bbb;
      font-weight: 600;
    }
    .tp-pts {
      font-size: 1.05rem;
      font-weight: 900;
      color: #f9a825;
      font-variant-numeric: tabular-nums;
    }
    .tp-label {
      font-size: 0.55rem;
      color: #888;
      font-weight: 700;
      align-self: flex-end;
      margin-bottom: 2px;
    }
    .tp-stat {
      font-size: 0.65rem;
      color: #aaa;
      font-weight: 600;
    }

    /* ── MY BETS ── */
    #bets-view {
      padding: 10px;
      background: var(--bg);
      min-height: calc(100vh - 70px);
    }

    .bets-summary {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .bets-stat {
      flex: 1;
      background: var(--blue);
      color: #fff;
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
    }

    .bets-stat-val {
      font-size: 1.1rem;
      font-weight: 900;
      display: block;
    }

    .bets-stat-lbl {
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .bet-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .bet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--blue);
      color: #fff;
    }

    .bet-type {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .bet-odds {
      font-size: 0.9rem;
      font-weight: 900;
      color: var(--gold);
    }

    .bet-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      background: #f5f7ff;
      font-size: 0.72rem;
    }

    .bet-wager { color: var(--muted); font-weight: 600; }
    .bet-payout { font-weight: 800; color: var(--blue); }
    .bet-boost {
      font-size: 0.6rem;
      background: #7c4dff;
      color: #fff;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 700;
      margin-left: auto;
    }

    .bet-leg {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
    }

    .bet-leg:last-child { border-bottom: none; }

    .leg-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .leg-indicator.winning  { background: #2e7d32; box-shadow: 0 0 6px rgba(46,125,50,0.7); }
    .leg-indicator.losing   { background: #c62828; box-shadow: 0 0 6px rgba(198,40,40,0.7); }
    .leg-indicator.upcoming { background: #aaa; }
    .leg-indicator.unknown  { background: #e0e0e0; border: 1px solid #ccc; }

    .leg-info { flex: 1; min-width: 0; }

    .leg-pick {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .leg-score {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .leg-status {
      font-size: 0.62rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .leg-status.winning  { color: #2e7d32; }
    .leg-status.losing   { color: #c62828; }
    .leg-status.upcoming { color: var(--blue2); }

    .bet-card.all-winning .bet-header { background: #1b5e20; }
    .bet-card.all-losing  .bet-header { background: #b71c1c; }

    /* ── BETS TICKER STRIP (All tab) ── */
    #bets-ticker-strip {
      display: flex;
      align-items: stretch;
      overflow: hidden;
      height: 44px;
      background: #111;
      border-bottom: 3px solid var(--gold);
    }

    .bt-tag {
      background: var(--gold);
      color: #000;
      font-size: 0.62rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      flex-shrink: 0;
      line-height: 1.2;
    }

    .bt-tag span { font-size: 0.48rem; font-weight: 700; opacity: 0.7; }

    .bt-scroll { flex: 1; overflow: hidden; display: flex; align-items: center; }

    .bt-inner {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      animation: tk-scroll 90s linear infinite;
    }

    .bt-inner:hover { animation-play-state: paused; }

    .bt-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 18px 0 14px;
      border-right: 1px solid #333;
    }

    .bt-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .bt-dot.winning  { background: #4caf50; box-shadow: 0 0 5px rgba(76,175,80,0.8); }
    .bt-dot.losing   { background: #f44336; box-shadow: 0 0 5px rgba(244,67,54,0.8); }
    .bt-dot.upcoming { background: #888; }
    .bt-dot.unknown  { background: #555; }

    .bt-pick { font-size: 0.78rem; font-weight: 700; color: #fff; }
    .bt-score { font-size: 0.68rem; color: #aaa; }
    .bt-parlay-sep {
      font-size: 0.65rem;
      color: var(--gold);
      font-weight: 900;
      padding: 0 6px;
      border-right: 1px solid #555;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: var(--blue2);
      border-bottom: 3px solid var(--gold);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: 1;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      padding: 7px 4px;
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -3px;
      transition: color 0.15s, background 0.15s;
    }

    .tab:hover { color: #fff; }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    .tab .n {
      font-size: 0.6rem;
      opacity: 0.7;
      margin-left: 3px;
    }

    /* ── SECTION ── */
    .section-label {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #fff;
      background: var(--orange);
      padding: 4px 10px;
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .section-label.collapsible:hover { filter: brightness(1.1); }

    /* ── BRACKET ── */
    #bracket-view {
      padding: 10px;
      background: var(--bg);
      min-height: calc(100vh - 70px);
    }

    .bracket-banner {
      background: var(--blue);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .bracket-banner-title {
      font-size: 0.95rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.04em;
    }

    .bracket-banner-sub {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.65);
      margin-top: 2px;
    }

    .bracket-count {
      background: var(--gold);
      color: #000;
      font-size: 1.1rem;
      font-weight: 900;
      border-radius: 6px;
      padding: 6px 12px;
      text-align: center;
      flex-shrink: 0;
    }

    .bracket-count span {
      display: block;
      font-size: 0.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Region bracket */
    .bracket-regions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .bracket-region {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .bracket-region-header {
      background: var(--blue2);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 10px;
    }

    .bracket-matchup {
      display: flex;
      flex-direction: column;
      padding: 5px 8px;
      border-bottom: 1px solid var(--border);
      gap: 2px;
    }

    .bracket-matchup:last-child { border-bottom: none; }

    .bracket-team {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      padding: 2px 0;
    }

    .bracket-team-seed {
      font-size: 0.55rem;
      font-weight: 800;
      color: #fff;
      background: var(--blue);
      border-radius: 2px;
      min-width: 16px;
      text-align: center;
      padding: 1px 3px;
      flex-shrink: 0;
    }

    .bracket-team-seed.tbd { background: #ccc; color: #888; }

    .bracket-team-logo {
      width: 14px; height: 14px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .bracket-team-name {
      font-weight: 600;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bracket-team-name.tbd { color: #bbb; font-style: italic; font-weight: 400; }

    .bracket-team.clinched .bracket-team-name { color: var(--blue); font-weight: 700; }

    .bracket-auto-badge {
      font-size: 0.48rem;
      background: #2e7d32;
      color: #fff;
      padding: 1px 4px;
      border-radius: 2px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .bracket-vs { font-size: 0.52rem; color: #bbb; text-align: center; line-height: 1; }

    /* Selection Sunday notice */
    .selection-notice {
      background: var(--card);
      border: 2px dashed var(--gold);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      margin-bottom: 10px;
    }

    .selection-notice-date {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--blue);
    }

    .selection-notice-label {
      font-size: 0.62rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 3px;
    }

    /* Clinched list */
    .clinched-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .clinched-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid #2e7d32;
      border-radius: 6px;
      padding: 7px 9px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .clinched-logo {
      width: 22px; height: 22px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .clinched-name {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .clinched-conf {
      font-size: 0.54rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── TOURNAMENT BOUND wall ── */
    .tourney-wall {
      margin: 10px 6px 16px;
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(135deg, #0d1440 0%, #1a237e 50%, #0d1440 100%);
      border: 2px solid var(--gold);
      box-shadow: 0 4px 20px rgba(249,168,37,0.2);
    }

    .tourney-wall-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      border-bottom: 1px solid rgba(249,168,37,0.3);
    }

    .tourney-wall-title {
      font-size: 0.9rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .tourney-wall-count {
      background: var(--gold);
      color: #000;
      font-size: 0.65rem;
      font-weight: 900;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    /* Scrolling strip */
    .tourney-strip-wrap {
      overflow: hidden;
      padding: 8px 0 10px;
    }

    .tourney-strip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      padding: 0 8px;
      animation: tk-scroll 40s linear infinite;
    }

    .tourney-strip:hover { animation-play-state: paused; }

    .tourney-badge {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      position: relative;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 7px 10px 6px;
      min-width: 68px;
      cursor: default;
    }

    .tourney-badge:hover {
      background: rgba(255,255,255,0.14);
      border-color: var(--gold);
    }

    .tb-logo {
      width: 34px; height: 34px;
      object-fit: contain;
    }

    .tb-fallback {
      width: 34px; height: 34px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.52rem;
      font-weight: 900;
      color: #fff;
    }

    .tb-check {
      position: absolute;
      top: -4px; right: -4px;
      background: #2e7d32;
      color: #fff;
      font-size: 0.45rem;
      width: 13px; height: 13px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #0d1440;
      font-weight: 900;
    }

    .tb-name {
      font-size: 0.58rem;
      font-weight: 700;
      color: #fff;
      text-align: center;
      max-width: 68px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.2;
    }

    .tourney-empty {
      padding: 16px;

    }

    /* ── CREATOR CARD ── */

    /* ── GRID WRAPPER ── */

    /* ── NARROW PANEL MODE (≤ 480px) ── */

      body { font-size: 12px; }

      /* Bets tab */

      .bets-stat-val { font-size: 0.95rem; }

      .espn-abbr { min-width: 32px; }
      .espn-score { font-size: 0.9rem; min-width: 22px; }

    /* ── GAME CARD ── */
    .game {
      background: var(--card);

      flex: 1;

      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;

.team-name {

      gap: 4px;

      font-size: 0.58rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;

      gap: 3px;

    .status-label.live     { color: var(--live); }
    .status-label.final    { color: var(--final); }
    .status-label.upcoming { color: var(--blue2); }

    .status-label.live::before {
      content: '';
      width: 5px; height: 5px;
      background: var(--live);
      border-radius: 50%;
      flex-shrink: 0;
      animation: blink 1.2s ease-in-out infinite;
    }

    .status-clock {
      font-size: 0.58rem;
      color: var(--muted);
    }

    .tv-tag {
      font-size: 0.52rem;
      color: var(--muted);
      background: var(--border);
      padding: 1px 4px;
      border-radius: 2px;
      margin-left: auto;
    }

    /* ── STATES ── */
    .empty {
      text-align: center;
      padding: 40px 16px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 30px auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="header-right">

<div class="tabs">

  <button class="tab"        id="tab-live"     onclick="setTab('live')">Live<span class="n" id="n-live"></span></button>

  <button class="tab"        id="tab-bets"     onclick="setTab('bets')">My Bets</button>

<div id="content">
  <div class="spinner"></div>
  <div class="empty">Loading…</div>
</div>

<script>
  let games = [], dkOdds = {}, tab = 'all', cd = 20, timer;

  // ── MY BETS (DraftKings slips) ──────────────────────────
  const MY_BETS = [
    {
      id: 1, type: '2-Pick Parlay', odds: '+241', wager: 25.00, toPay: 85.32, cashOut: 30.10,
      legs: [
        { pick: 'Ohio State +1.5', type: 'spread', spread: 1.5,  terms: ['ohio state','ohst','osu'] },
        { pick: 'Kentucky -2.5',   type: 'spread', spread: -2.5, terms: ['kentucky','uk','ken'] },
      ]
    },
    {
      id: 2, type: '2-Pick Parlay', odds: '+1033', wager: 20.00, toPay: 226.60, cashOut: 10.14,
      boost: '+20% Parlay Boost',
      legs: [
        { pick: 'Texas Tech ML', type: 'ml', terms: ['texas tech','ttu'] },
        { pick: 'NC State ML',   type: 'ml', terms: ['nc state','ncst','ncs'] },
      ]
    },
    {
      id: 3, type: '2-Pick Parlay', odds: '+620', wager: 15.00, toPay: 108.00, cashOut: 13.50,
      legs: [
        { pick: 'Washington ML', type: 'ml', terms: ['washington','wash'] },
        { pick: 'Miami FL ML',   type: 'ml', terms: ['miami fl','miami','mia'] },
      ]
    },
    {
      id: 4, type: '4-Pick Parlay', odds: '+935', wager: 10.00, toPay: 103.58,
      legs: [
        { pick: 'Miami FL ML',   type: 'ml', terms: ['miami fl','miami','mia'] },
        { pick: 'Arizona ML',    type: 'ml', terms: ['arizona','ariz','ari'] },
        { pick: 'Tennessee ML',  type: 'ml', terms: ['tennessee','tenn','ten'] },
        { pick: 'Washington ML', type: 'ml', terms: ['washington','wash'] },
      ]
    },
  ];

  function findGameForLeg(leg) {
    return games.find(e => {
      const comps = e.competitions?.[0]?.competitors || [];
      return comps.some(c => {
        const n = (c.team?.shortDisplayName || c.team?.displayName || c.team?.name || '').toLowerCase();
        const a = (c.team?.abbreviation || '').toLowerCase();
        return leg.terms.some(t => n.includes(t) || a === t);
      });
    });
  }

  function legResult(leg, game) {
    const status = statusOf(game);
    const comps = game.competitions?.[0]?.competitors || [];
    const myComp = comps.find(c => {
      const n = (c.team?.shortDisplayName || c.team?.displayName || c.team?.name || '').toLowerCase();
      const a = (c.team?.abbreviation || '').toLowerCase();
      return leg.terms.some(t => n.includes(t) || a === t);
    });
    if (!myComp) return { state: 'unknown', score: '' };
    const oppComp = comps.find(c => c !== myComp);
    const myScore  = parseInt(myComp.score)  || 0;
    const oppScore = parseInt(oppComp?.score) || 0;
    const myAbbr  = myComp.team?.abbreviation  || '';
    const oppAbbr = oppComp?.team?.abbreviation || '';
    const scoreStr = status === 'upcoming' ? `${myAbbr} vs ${oppAbbr} · ${clockOf(game)}` : `${myAbbr} ${myScore} – ${oppAbbr} ${oppScore} · ${clockOf(game)}`;

    if (status === 'upcoming') return { state: 'upcoming', score: scoreStr };

    let covering;
    if (leg.type === 'ml') {
      covering = myScore > oppScore;
    } else {
      covering = (myScore + leg.spread) > oppScore;
    }
    return { state: covering ? 'winning' : 'losing', score: scoreStr };
  }

  function buildBetsTicker() {
    const chips = [];
    MY_BETS.forEach((bet, bi) => {
      // Add a parlay label separator
      chips.push(`<span class="bt-parlay-sep">PARLAY ${bi+1} · ${bet.odds}</span>`);
      bet.legs.forEach(leg => {
        const game = findGameForLeg(leg);
        let dotCls = 'unknown', scoreStr = '—';
        if (game) {
          const r = legResult(leg, game);
          dotCls = r.state;
          scoreStr = r.score;
        }
        chips.push(`<div class="bt-chip">
          <div class="bt-dot ${dotCls}"></div>
          <span class="bt-pick">${leg.pick}</span>
          <span class="bt-score">${scoreStr}</span>
        </div>`);
      });
    });
    const items = chips.join('');
    return `<div id="bets-ticker-strip">
      <div class="bt-tag">MY<span>BETS</span></div>
      <div class="bt-scroll">
        <div class="bt-inner">${items}${items}</div>
      </div>
    </div>`;
  }

  function renderBets() {
    const el = document.getElementById('bets-view');
    let totalWager = 0, totalPotential = 0;
    let html = '';

    for (const bet of MY_BETS) {
      totalWager += bet.wager;
      totalPotential += bet.toPay;

      const legResults = bet.legs.map(leg => {
        const game = findGameForLeg(leg);
        if (!game) return { leg, state: 'unknown', score: 'Game not found' };
        return { leg, ...legResult(leg, game) };
      });

      const states = legResults.map(r => r.state);
      const allWin  = states.every(s => s === 'winning');
      const anyLose = states.some(s => s === 'losing');
      const cardCls = allWin ? 'all-winning' : anyLose ? 'all-losing' : '';

      html += `<div class="bet-card ${cardCls}">
        <div class="bet-header">
          <span class="bet-type">${bet.type}</span>
          <span class="bet-odds">${bet.odds}</span>
        </div>
        <div class="bet-meta">
          <span class="bet-wager">Wager: $${bet.wager.toFixed(2)}</span>
          <span class="bet-payout">To Win: $${(bet.toPay - bet.wager).toFixed(2)}</span>
          ${bet.boost ? `<span class="bet-boost">${bet.boost}</span>` : `<span style="margin-left:auto;font-size:0.65rem;color:var(--muted)">Cash Out: $${bet.cashOut.toFixed(2)}</span>`}
        </div>`;

      for (const r of legResults) {
        const ind = r.state === 'winning' ? 'winning' : r.state === 'losing' ? 'losing' : r.state === 'upcoming' ? 'upcoming' : 'unknown';
        const lbl = r.state === 'winning' ? '✓ Covering' : r.state === 'losing' ? '✗ Losing' : r.state === 'upcoming' ? 'Up Next' : '—';
        html += `<div class="bet-leg">
          <div class="leg-indicator ${ind}"></div>
          <div class="leg-info">
            <div class="leg-pick">${r.leg.pick}</div>
            <div class="leg-score">${r.score}</div>
          </div>
          <span class="leg-status ${ind}">${lbl}</span>
        </div>`;
      }

      html += `</div>`;
    }

    const summaryHtml = `<div class="bets-summary">
      <div class="bets-stat"><span class="bets-stat-val">$${totalWager.toFixed(2)}</span><span class="bets-stat-lbl">At Risk</span></div>
      <div class="bets-stat"><span class="bets-stat-val">$${totalPotential.toFixed(2)}</span><span class="bets-stat-lbl">If All Win</span></div>
      <div class="bets-stat"><span class="bets-stat-val">$${(totalPotential - totalWager).toFixed(2)}</span><span class="bets-stat-lbl">Net Profit</span></div>
    </div>`;

    el.innerHTML = summaryHtml + html;
  }
  const ODDS_KEY_STORE = 'mm_odds_api_key';
  let oddsApiKey = localStorage.getItem(ODDS_KEY_STORE) || '';

  // Conference tournament seeds — static for the tournament
  const CONF_SEEDS = {
    // ACC
    'Duke':1,'Virginia':2,'Miami':3,'North Carolina':4,'UNC':4,'Clemson':5,
    'Louisville':6,'NC State':7,'Florida St':8,'Florida State':8,'Cal':9,'California':9,
    'Stanford':10,'SMU':11,'Virginia Tech':12,'Va Tech':12,'Wake Forest':13,
    'Syracuse':14,'Pitt':15,'Pittsburgh':15,'Notre Dame':16,'Boston College':17,'Boston Col':17,
    'Georgia Tech':18,
    // Big Ten
    'Michigan':1,'Illinois':2,'Michigan St':3,'Michigan State':3,'Nebraska':4,'Wisconsin':5,
    'Purdue':6,'UCLA':7,'Ohio St':8,'Ohio State':8,'Iowa':9,'Indiana':10,'Minnesota':11,
    'USC':12,'Washington':13,'Rutgers':14,'Northwestern':15,'Oregon':16,'Maryland':17,
    'Penn St':18,'Penn State':18,
    // Big 12
    'Arizona':1,'Houston':2,'Kansas':3,'Texas Tech':4,'Iowa St':5,'Iowa State':5,
    'TCU':6,'West Virginia':7,'WVU':7,'UCF':8,'Cincinnati':9,'BYU':10,'Colorado':11,
    'Arizona St':12,'Arizona State':12,'Baylor':13,'Oklahoma St':14,'Oklahoma State':14,
    'Kansas St':15,'Kansas State':15,'Utah':16,
    // Big East
    "St. John's":1,'UConn':2,'Connecticut':2,'Villanova':3,'Seton Hall':4,'Creighton':5,
    'DePaul':6,'Marquette':7,'Butler':8,'Providence':9,'Xavier':10,'Georgetown':11,
    // SEC
    'Florida':1,'Alabama':2,'Arkansas':3,'Vanderbilt':4,'Tennessee':5,'Texas A&M':6,
    'Georgia':7,'Missouri':8,'Kentucky':9,'Texas':10,'Oklahoma':11,'Auburn':12,
    'Mississippi St':13,'Mississippi State':13,'Miss State':13,'South Carolina':14,
    'S Carolina':14,'Ole Miss':15,'LSU':16,
  };

  function getSeed(competitor) {
    if (competitor.seed) return parseInt(competitor.seed);
    const name = competitor.team?.shortDisplayName || competitor.team?.name || '';
    return CONF_SEEDS[name] || null;
  }

  const statusOf = e => {
    const n = e.status?.type?.name || '';
    if (n === 'STATUS_IN_PROGRESS' || n === 'STATUS_HALFTIME') return 'live';
    if (n.startsWith('STATUS_FINAL')) return 'final';
    return 'upcoming';
  };

  const clockOf = e => {
    const t = e.status?.type;
    const n = t?.name || '';
    if (n === 'STATUS_HALFTIME') return 'Half';
    if (n === 'STATUS_IN_PROGRESS') return t?.shortDetail || t?.detail || 'Live';
    if (n.startsWith('STATUS_FINAL')) return 'Final';
    if (e.date) return new Date(e.date).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
    return t?.description || '';
  };

  const roundOf = e => {
    for (const n of e.competitions?.[0]?.notes || [])
      if (n.headline) return n.headline;
    return '';
  };

  const tvOf = e => {
    const bc = e.competitions?.[0]?.broadcasts;
    if (Array.isArray(bc) && bc[0]) {
      const b = bc[0];
      return b.names?.[0] || b.media?.shortName || (typeof b === 'string' ? b : null);
    }
    return null;
  };

  function buildGame(e) {
    const comp = e.competitions?.[0];
    if (!comp) return '';
    const status = statusOf(e);
    const clock  = clockOf(e);
    const round  = roundOf(e);
    const tv     = tvOf(e);

    const comps = comp.competitors || [];
    const away  = comps.find(c => c.homeAway === 'away') || comps[0];
    const home  = comps.find(c => c.homeAway === 'home') || comps[1];
    if (!away || !home) return '';

    const aScore = parseInt(away.score) || 0;
    const hScore = parseInt(home.score) || 0;
    const showW  = status !== 'upcoming';
    const aWin   = showW && aScore > hScore;
    const hWin   = showW && hScore > aScore;

    // Upset: higher seed number (worse team) currently leading a live game
    const aSeed = getSeed(away);
    const hSeed = getSeed(home);
    const seedsValid = aSeed && hSeed && aScore !== hScore;
    const isUpset = status === 'live' && seedsValid &&
      ((aWin && aSeed > hSeed) || (hWin && hSeed > aSeed));

    const teamHtml = (t, score, win, lose) => {
      const logo = t.team?.logo;
      const abbr = t.team?.abbreviation || '?';
      const name = t.team?.shortDisplayName || t.team?.name || abbr;
      const scoreStr = status === 'upcoming' ? '' : score;
      const cls = !showW ? '' : win ? 'winning' : 'losing';
      const logoEl = logo
        ? `<img class="logo" src="${logo}" alt="${abbr}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="logo-abbr" style="display:none">${abbr}</div>`
        : `<div class="logo-abbr">${abbr}</div>`;

      // Show tournament seed number (conference lookup or NCAA seed)
      const seed = getSeed(t);
      const seedBadge = seed ? `<span class="seed-badge seed-ncaa">${seed}</span>` : '';

      return `<div class="team-row ${cls}">${logoEl}${seedBadge}<span class="team-name">${name}</span><span class="team-score">${scoreStr}</span></div>`;
    };

    // clock display
    let clockTop = status === 'live' ? 'Live' : status === 'final' ? 'Final' : 'Soon';
    let clockBot = '';
    if (status === 'live' && clock !== 'Live') clockBot = clock;
    else if (status === 'upcoming') clockBot = clock;

    return `
      <div class="game ${status}${isUpset ? ' upset' : ''}">
        <div class="game-teams">
          ${round ? `<div class="round-tag">${round}</div>` : ''}
          ${teamHtml(away, aScore, aWin, hWin)}
          <div class="divider-row"></div>
          ${teamHtml(home, hScore, hWin, aWin)}
        </div>
        <div class="game-status">
          <div class="status-label ${status}">${clockTop}</div>
          ${clockBot ? `<span class="status-clock">${clockBot}</span>` : ''}
          ${tv ? `<span class="tv-tag">${tv}</span>` : ''}
        </div>
      </div>`;
  }

  function render() {
    const live     = games.filter(e => statusOf(e) === 'live');
    const final    = games.filter(e => statusOf(e) === 'final');
    const upcoming = games.filter(e => statusOf(e) === 'upcoming');

    document.getElementById('n-all').textContent   = games.length ? ` ${games.length}` : '';
    document.getElementById('n-live').textContent  = live.length  ? ` ${live.length}`  : '';
    document.getElementById('n-final').textContent = final.length ? ` ${final.length}` : '';

    const pill = document.getElementById('live-pill');
    if (live.length) { pill.style.display='flex'; document.getElementById('live-count').textContent=live.length; }
    else pill.style.display='none';

    let filtered;
    if      (tab === 'live')  filtered = live;
    else if (tab === 'final') filtered = final;
    else                      filtered = games;

    if (!filtered.length) {
      document.getElementById('content').innerHTML =
        `<div class="empty">${games.length ? 'No games in this category' : 'No games right now'}</div>`;
      return;
    }

    const grid = games => `<div class="games-grid">${games.map(buildGame).join('')}</div>`;

    // Collapsed state persists across renders
    if (!window._collapsed) window._collapsed = {};
    const section = (label, games, key, defaultCollapsed) => {
      if (!(key in window._collapsed)) window._collapsed[key] = !!defaultCollapsed;
      const collapsed = window._collapsed[key];
      return `<div class="section-label collapsible${collapsed ? ' collapsed' : ''}" onclick="toggleSection('${key}')">
        <span>${label}</span><span class="section-chevron">▾</span>
      </div>
      <div class="section-body${collapsed ? ' collapsed' : ''}">${grid(games)}</div>`;
    };

    let html = '';
    if (tab === 'all') {
      html += buildBetsTicker();
      if (live.length)     html += `<div class="section-label">Live Now</div>${grid(live)}`;
      if (upcoming.length) html += section('Upcoming Today', upcoming, 'upcoming', true);
      const todayFinal     = final.filter(e => e._day !== 'yesterday');
      const yesterdayFinal = final.filter(e => e._day === 'yesterday');
      if (todayFinal.length)     html += section('Final — Today', todayFinal, 'final-today', true);
      if (yesterdayFinal.length) html += section('Final — Yesterday', yesterdayFinal, 'final-yesterday', true);
      html += buildTourneyWall();
      html += buildCreatorCard();
    } else if (tab === 'final') {
      const todayFinal     = filtered.filter(e => e._day !== 'yesterday');
      const yesterdayFinal = filtered.filter(e => e._day === 'yesterday');
      if (todayFinal.length)     html += `<div class="section-label">Today</div>${grid(todayFinal)}`;
      if (yesterdayFinal.length) html += `<div class="section-label">Yesterday</div>${grid(yesterdayFinal)}`;
      if (!html) html = grid(filtered);
    } else {
      html = grid(filtered);
    }

    document.getElementById('content').innerHTML = html;
    if (tab === 'ticker') renderTicker();
    if (tab === 'bets')   renderBets();
  }

  async function fetchDkOdds() {
    if (!oddsApiKey) return;
    try {
      const r = await fetch(
        `https://api.the-odds-api.com/v4/sports/basketball_ncaab/odds?regions=us&markets=h2h,spreads,totals&oddsFormat=american&bookmakers=draftkings&apiKey=${oddsApiKey}`,
        { cache: 'no-store' }
      );
      if (!r.ok) return;
      const events = await r.json();
      dkOdds = {};
      for (const ev of events) {
        const dk = ev.bookmakers?.[0];
        if (!dk) continue;
        const markets = {};
        for (const m of dk.markets || []) markets[m.key] = m.outcomes;
        // key by away_team + home_team normalized
        const key = (ev.away_team + '|' + ev.home_team).toLowerCase();
        dkOdds[key] = markets;
      }
    } catch(e) { /* silent */ }
  }

  function getDkLine(away, home) {
    const aName = away.team?.displayName || '';
    const hName = home.team?.displayName || '';
    const key = (aName + '|' + hName).toLowerCase();
    // Try fuzzy match
    const match = Object.keys(dkOdds).find(k => {
      const [a, h] = k.split('|');
      return aName.toLowerCase().includes(a.split(' ').pop()) ||
             hName.toLowerCase().includes(h.split(' ').pop());
    });
    return dkOdds[key] || (match ? dkOdds[match] : null);
  }

  async function fetchTopPerformers(liveGames) {
    const results = await Promise.allSettled(
      liveGames.map(e =>
        fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/summary?event=${e.id}`)
          .then(r => r.json())
      )
    );
    const performers = [];
    results.forEach(res => {
      if (res.status !== 'fulfilled') return;
      const players = res.value?.boxscore?.players || [];
      players.forEach(teamData => {
        const teamAbbr = teamData.team?.abbreviation || '?';
        const stats = teamData.statistics?.[0];
        if (!stats) return;
        const ptsIdx = stats.names?.indexOf('PTS') ?? -1;
        const rebIdx = stats.names?.indexOf('REB') ?? -1;
        const astIdx = stats.names?.indexOf('AST') ?? -1;
        if (ptsIdx < 0) return;
        stats.athletes?.forEach(a => {
          const pts = parseInt(a.stats?.[ptsIdx]) || 0;
          if (pts === 0) return;
          performers.push({
            name: a.athlete?.shortName || a.athlete?.displayName || '?',
            team: teamAbbr,
            pts,
            reb: rebIdx >= 0 ? parseInt(a.stats?.[rebIdx]) || 0 : 0,
            ast: astIdx >= 0 ? parseInt(a.stats?.[astIdx]) || 0 : 0,
          });
        });
      });
    });
    return performers.sort((a, b) => b.pts - a.pts).slice(0, 12);
  }

  async function renderTicker() {
    const live     = games.filter(e => statusOf(e) === 'live');
    const upcoming = games.filter(e => statusOf(e) === 'upcoming');
    const el = document.getElementById('ticker-view');

    const makeLiveChip = e => {
      const comp  = e.competitions?.[0];
      const comps = comp?.competitors || [];
      const away  = comps.find(c => c.homeAway === 'away') || comps[0];
      const home  = comps.find(c => c.homeAway === 'home') || comps[1];
      if (!away || !home) return '';
      const aScore = parseInt(away.score) || 0;
      const hScore = parseInt(home.score) || 0;
      const aWin = aScore > hScore, hWin = hScore > aScore;
      const showW = aScore !== hScore;
      const aSeed = getSeed(away), hSeed = getSeed(home);
      const seedsValid = aSeed && hSeed && showW;
      const isUpset = seedsValid && ((aWin && aSeed > hSeed) || (hWin && hSeed > aSeed));
      const aAbbr = away.team?.abbreviation || '?';
      const hAbbr = home.team?.abbreviation || '?';
      const detail = e.status?.type?.shortDetail || clockOf(e) || '';
      // parse "7:43 - 2nd" into clock + period
      const parts = detail.split(' - ');
      const clk = parts[0] || detail;
      const per = parts[1] || '';
      const aCls = !showW ? '' : aWin ? ' winning' : ' losing';
      const hCls = !showW ? '' : hWin ? ' winning' : ' losing';
      return `<div class="espn-game${isUpset ? ' upset' : ''}">
        <div class="espn-teams">
          <div class="espn-team-row${aCls}">
            <span class="espn-seed">${aSeed || ''}</span>
            <span class="espn-abbr">${aAbbr}</span>
            <span class="espn-score">${aScore}</span>
          </div>
          <div class="espn-team-row${hCls}">
            <span class="espn-seed">${hSeed || ''}</span>
            <span class="espn-abbr">${hAbbr}</span>
            <span class="espn-score">${hScore}</span>
          </div>
        </div>
        <div class="espn-status">
          <span class="espn-clock">${clk}</span>
          ${per ? `<span class="espn-period">${per}</span>` : ''}
        </div>
      </div>`;
    };

    const makeUpChip = e => {
      const comp  = e.competitions?.[0];
      const comps = comp?.competitors || [];
      const away  = comps.find(c => c.homeAway === 'away') || comps[0];
      const home  = comps.find(c => c.homeAway === 'home') || comps[1];
      if (!away || !home) return '';
      const aAbbr = away.team?.abbreviation || '?';
      const hAbbr = home.team?.abbreviation || '?';
      const aSeed = getSeed(away), hSeed = getSeed(home);
      const aStr = aSeed ? `<span style="font-size:.6em;color:#888">${aSeed}</span> ` : '';
      const hStr = hSeed ? `<span style="font-size:.6em;color:#888">${hSeed}</span> ` : '';
      const time = clockOf(e);
      const network = tvOf(e) || '';
      return `<div class="espn-up-game">
        <span class="espn-up-teams">${aStr}${aAbbr}<span class="at">@</span>${hStr}${hAbbr}</span>
        <span class="espn-up-time">${time}${network ? ' · ' + network : ''}</span>
      </div>`;
    };

    const liveItems    = live.map(makeLiveChip).join('');
    const upcomingItems = upcoming.map(makeUpChip).join('');
    const liveDur   = Math.max(25, live.length * 7);
    const upDur     = Math.max(30, upcoming.length * 4);

    let html = '';

    if (live.length) {
      html += `<div class="espn-band">
        <div class="espn-tag">NCAAB<span class="tag-sub">LIVE</span></div>
        <div class="espn-scroll">
          <div class="espn-inner" style="animation-duration:${liveDur}s">${liveItems}${liveItems}</div>
        </div>
      </div>`;
    }

    if (upcoming.length) {
      html += `<div class="espn-band">
        <div class="espn-tag upcoming-tag">UP<span class="tag-sub">NEXT</span></div>
        <div class="espn-scroll">
          <div class="espn-inner" style="animation-duration:${upDur}s">${upcomingItems}${upcomingItems}</div>
        </div>
      </div>`;
    }

    if (!html) {
      html = `<div style="color:#666;padding:24px;text-align:center;font-size:0.85rem;">No games right now</div>`;
    }

    if (live.length) {
      const performers = await fetchTopPerformers(live);
      if (performers.length) {
        const chips = performers.map(p => {
          const extras = [
            p.reb ? `${p.reb} REB` : '',
            p.ast ? `${p.ast} AST` : '',
          ].filter(Boolean).join(' · ');
          return `<div class="tp-chip">
            <span class="tp-name">${p.name}</span>
            <span class="tp-team">${p.team}</span>
            <span class="tp-pts">${p.pts}</span>
            <span class="tp-label">PTS</span>
            ${extras ? `<span class="tp-stat">${extras}</span>` : ''}
          </div>`;
        }).join('');
        const tpDur = Math.max(30, performers.length * 4);
        html += `<div class="espn-band" style="border-bottom:none;border-top:3px solid #f9a825;">
          <div class="espn-tag" style="background:#f9a825;color:#000;min-width:60px;">TOP<span class="tag-sub">SCORERS</span></div>
          <div class="espn-scroll">
            <div class="espn-inner" style="animation-duration:${tpDur}s">${chips}${chips}</div>
          </div>
        </div>`;
      }
    }

    el.innerHTML = html;
  }

  function saveOddsKey() {
    const val = document.getElementById('odds-key-input')?.value?.trim() || '';
    oddsApiKey = val;
    if (val) localStorage.setItem(ODDS_KEY_STORE, val);
    else localStorage.removeItem(ODDS_KEY_STORE);
    fetchDkOdds().then(renderTicker);
  }

  function espnDate(offset = 0) {
    const d = new Date();
    d.setDate(d.getDate() + offset);
    return d.getFullYear().toString()
      + String(d.getMonth()+1).padStart(2,'0')
      + String(d.getDate()).padStart(2,'0');
  }

  async function fetchScores() {
    try {
      const BASE = 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?limit=300&groups=50';
      // Fetch all three: no-date (ESPN live default), today, yesterday
      const [r0, r1, r2] = await Promise.all([
        fetch(BASE,                            { cache: 'no-store' }),
        fetch(`${BASE}&dates=${espnDate(0)}`,  { cache: 'no-store' }),
        fetch(`${BASE}&dates=${espnDate(-1)}`, { cache: 'no-store' }),
      ]);
      const [d0, d1, d2] = await Promise.all([r0.json(), r1.json(), r2.json()]);

      const todayStr = espnDate(0);
      const seen = new Set();
      const merged = [];

      for (const e of [...(d0.events||[]), ...(d1.events||[]), ...(d2.events||[])]) {
        if (seen.has(e.id)) continue;
        seen.add(e.id);
        // Convert UTC game time → local date string for correct timezone comparison
        const localDate = e.date ? new Date(e.date) : null;
        const gameDay = localDate
          ? localDate.getFullYear().toString()
            + String(localDate.getMonth()+1).padStart(2,'0')
            + String(localDate.getDate()).padStart(2,'0')
          : todayStr;
        merged.push({ ...e, _day: gameDay === todayStr ? 'today' : 'yesterday' });
      }

      games = merged;
      render();
    } catch(err) {
      if (!games.length)
        document.getElementById('content').innerHTML = '<div class="empty">⚠ Could not load scores</div>';
    }
  }

  // ── BRACKET ──────────────────────────────────────────────
  const REGIONS = ['South','East','West','Midwest'];

  function getConferenceWinners() {
    const winners = [], seen = new Set();
    for (const e of games) {
      if (statusOf(e) !== 'final') continue;
      const round = roundOf(e).toLowerCase();
      if (!round.includes('championship') && !round.includes('title') && !round.includes('final')) continue;
      const comps = e.competitions?.[0]?.competitors || [];
      let winner = comps.find(c => c.winner === true);
      if (!winner) winner = comps.reduce((a,b) => ((parseInt(a.score)||0) > (parseInt(b.score)||0) ? a : b));
      if (!winner || seen.has(winner.team?.id)) continue;
      seen.add(winner.team?.id);
      winners.push({
        team: winner.team?.shortDisplayName || winner.team?.name || '?',
        abbr: winner.team?.abbreviation || '?',
        logo: winner.team?.logo || null,
        conf: roundOf(e).replace(/ - ?(Championship|Final|Title).*/i,'').trim(),
      });
    }
    return winners;
  }

  async function renderBracket() {
    const el = document.getElementById('bracket-view');
    el.innerHTML = '<div class="spinner"></div><div class="empty">Loading bracket…</div>';

    // Try ESPN tournament bracket API
    let espnBracket = null;
    try {
      const r = await fetch(
        'https://site.api.espn.com/apis/v2/sports/basketball/mens-college-basketball/tournaments',
        { cache: 'no-store' }
      );
      if (r.ok) espnBracket = await r.json();
    } catch(e) {}

    // Also try the specific bracket endpoint
    let regionData = null;
    try {
      const r2 = await fetch(
        'https://site.api.espn.com/apis/v2/sports/basketball/mens-college-basketball/tournaments/22/2026/bracket',
        { cache: 'no-store' }
      );
      if (r2.ok) regionData = await r2.json();
    } catch(e) {}

    const winners = getConferenceWinners();
    let html = '';

    // Banner
    html += `<div class="bracket-banner">
      <div>
        <div class="bracket-banner-title">🏆 NCAA Tournament 2026</div>
        <div class="bracket-banner-sub">Selection Sunday · March 15, 2026</div>
      </div>
      <div class="bracket-count">${winners.length}<span>Teams In</span></div>
    </div>`;

    // If ESPN bracket data with teams exists, show the real bracket
    if (regionData?.bracket?.regions?.length) {
      html += buildEspnBracket(regionData.bracket.regions);
    } else {
      // Show Selection Sunday notice + bracket skeleton
      html += `<div class="selection-notice">
        <div class="selection-notice-label">Full bracket releases</div>
        <div class="selection-notice-date">Selection Sunday, March 15</div>
        <div style="font-size:0.68rem;color:var(--muted);margin-top:6px">${winners.length} auto bid${winners.length!==1?'s':''} clinched so far</div>
      </div>`;

      // Show 4-region skeleton
      html += `<div class="bracket-regions">`;
      for (const region of REGIONS) {
        html += `<div class="bracket-region">
          <div class="bracket-region-header">${region}</div>`;
        for (let s = 1; s <= 8; s++) {
          const opp = 17 - s;
          html += `<div class="bracket-matchup">
            <div class="bracket-team">
              <span class="bracket-team-seed">${s}</span>
              <span class="bracket-team-name tbd">TBD</span>
            </div>
            <div class="bracket-vs">vs</div>
            <div class="bracket-team">
              <span class="bracket-team-seed">${opp}</span>
              <span class="bracket-team-name tbd">TBD</span>
            </div>
          </div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }

    // Conference winners list
    if (winners.length) {
      html += `<div class="section-label" style="margin-bottom:8px;">Auto Bids Clinched (${winners.length})</div>
        <div class="clinched-list">`;
      for (const w of winners) {
        const logoEl = w.logo
          ? `<img class="clinched-logo" src="${w.logo}" alt="${w.abbr}" onerror="this.style.display='none'">`
          : `<div class="clinched-logo" style="background:var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:0.48rem;font-weight:700;color:var(--muted)">${w.abbr}</div>`;
        html += `<div class="clinched-card">
          ${logoEl}
          <div style="min-width:0">
            <div class="clinched-name">${w.team}</div>
            <div class="clinched-conf">${w.conf}</div>
          </div>
        </div>`;
      }
      html += `</div>`;
    }

    el.innerHTML = html;
  }

  function buildEspnBracket(regions) {
    let html = `<div class="bracket-regions">`;
    for (const region of regions) {
      html += `<div class="bracket-region">
        <div class="bracket-region-header">${region.name || 'Region'}</div>`;
      const r1 = region.rounds?.[0]?.matchups || [];
      for (const matchup of r1) {
        const t = matchup.competitors || [];
        const makeTeam = c => {
          const seed = c.seed || '?';
          const name = c.team?.shortDisplayName || c.team?.name || 'TBD';
          const logo = c.team?.logo || null;
          const isTbd = !c.team;
          const logoEl = logo
            ? `<img class="bracket-team-logo" src="${logo}" alt="" onerror="this.style.display='none'">`
            : '';
          return `<div class="bracket-team${isTbd?' ':''}">
            <span class="bracket-team-seed${isTbd?' tbd':''}">${seed}</span>
            ${logoEl}
            <span class="bracket-team-name${isTbd?' tbd':''}">${name}</span>
          </div>`;
        };
        html += `<div class="bracket-matchup">
          ${t[0] ? makeTeam(t[0]) : '<div class="bracket-team"><span class="bracket-team-seed tbd">?</span><span class="bracket-team-name tbd">TBD</span></div>'}
          <div class="bracket-vs">vs</div>
          ${t[1] ? makeTeam(t[1]) : '<div class="bracket-team"><span class="bracket-team-seed tbd">?</span><span class="bracket-team-name tbd">TBD</span></div>'}
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
    return html;
  }

  function buildTourneyWall() {
    const winners = getConferenceWinners();

    if (winners.length === 0) {
      return `<div class="tourney-wall">
        <div class="tourney-wall-header">
          <div class="tourney-wall-title">🎟️ Tournament Bound</div>
          <div class="tourney-wall-count">0 / 68 IN</div>
        </div>
        <div class="tourney-empty">🏀 Waiting for conference champions…</div>
      </div>`;
    }

    const makeBadge = w => {
      const logoEl = w.logo
        ? `<img class="tb-logo" src="${w.logo}" alt="${w.abbr}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="tb-fallback" style="display:none">${w.abbr}</div>`
        : `<div class="tb-fallback">${w.abbr}</div>`;
      return `<div class="tourney-badge">
        <div class="tb-check">✓</div>
        ${logoEl}
        <div class="tb-name">${w.team}</div>
      </div>`;
    };

    const items = winners.map(makeBadge).join('');
    // Duplicate for seamless loop; speed scales with number of teams
    const dur = Math.max(20, winners.length * 3);

    return `<div class="tourney-wall">
      <div class="tourney-wall-header">
        <div class="tourney-wall-title">🎟️ Tournament Bound</div>
        <div class="tourney-wall-count">${winners.length} / 68 IN</div>
      </div>
      <div class="tourney-strip-wrap">
        <div class="tourney-strip" style="animation-duration:${dur}s">${items}${items}</div>
      </div>
    </div>`;
  }

  function buildCreatorCard() {
    return `<div class="creator-card">
      <div class="creator-header">
        <span class="creator-header-label">⚠️ Website Creator</span>

  function toggleSection(key) {
    if (!window._collapsed) window._collapsed = {};
    window._collapsed[key] = !window._collapsed[key];
    render();
  }

  function manualRefresh() { cd = 20; fetchScores(); }

  function setTab(t) {
    tab = t;
    ['all','live','final','ticker','bets','bracket'].forEach(x => {
      document.getElementById('tab-'+x).classList.toggle('active', x === t);
    });
    const isTicker  = t === 'ticker';
    const isBets    = t === 'bets';
    const isBracket = t === 'bracket';
    document.getElementById('ticker-view').style.display  = isTicker  ? 'block' : 'none';
    document.getElementById('bets-view').style.display    = isBets    ? 'block' : 'none';
    document.getElementById('bracket-view').style.display = isBracket ? 'block' : 'none';
    document.getElementById('content').style.display      = (!isTicker && !isBets && !isBracket) ? 'block' : 'none';
    if (isTicker)  renderTicker();
    else if (isBets)    renderBets();
    else if (isBracket) renderBracket();
    else render();
  }

  fetchScores();
  fetchDkOdds();
  timer = setInterval(() => {
    cd--;
    document.getElementById('cd').textContent = cd + 's';
    if (cd <= 0) { cd = 20; fetchScores(); }
  }, 1000);
</script>

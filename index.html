<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>March Madness · Scores</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #eef2ff;
      --card:      #ffffff;
      --card-hover:#f0f4ff;
      --border:    #c8d4f0;
      --blue:      #1a237e;
      --blue2:     #1565c0;
      --live:      #e53935;
      --live-bg:   #fff5f5;
      --final:     #78909c;
      --gold:      #f9a825;
      --orange:    #e65100;
      --text:      #0d1440;
      --muted:     #546e8a;
      --score:     #1a237e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--blue);
      border-bottom: 4px solid var(--gold);
      padding: 7px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 900;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
    }

    .brand span { color: var(--gold); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--live);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 2px;
      text-transform: uppercase;
    }

    .live-dot {
      width: 5px; height: 5px;
      background: #fff;
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .refresh-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.25); }

    .countdown {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.6);
      font-variant-numeric: tabular-nums;
      min-width: 24px;
    }

    /* ── TICKER TAB — full-page stock-market style ── */
    #ticker-view {
      display: none;
      flex-direction: column;
      background: #0a0e1a;
      min-height: calc(100vh - 70px);
    }

    /* Top label bar */
    .tk-header {
      display: flex;
      align-items: center;
      background: #0a0e1a;
      border-bottom: 1px solid #1e2a45;
      padding: 0;
      height: 28px;
      flex-shrink: 0;
    }

    .tk-header-badge {
      background: var(--live);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 10px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tk-header-badge .tk-hd-dot {
      width: 5px; height: 5px;
      background: #fff;
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }

    .tk-header-meta {
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 10px;
      font-size: 0.58rem;
      color: #4a6080;
    }

    .tk-header-count { color: #8aa0c0; }

    /* Main scrolling ticker band */
    .tk-band {
      flex: 1;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: #0d1220;
      border-bottom: 2px solid var(--gold);
      min-height: 56px;
      position: relative;
    }

    .tk-band-label {
      background: var(--gold);
      color: #0a0e1a;
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0 12px;
      height: 100%;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
      z-index: 2;
    }

    .tk-scroll-track {
      flex: 1;
      overflow: hidden;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .tk-scroll-inner {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      animation: tk-scroll 40s linear infinite;
    }

    .tk-scroll-inner:hover { animation-play-state: paused; }

    @keyframes tk-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Individual game chip in the live band */
    .tk-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 20px;
      border-right: 1px solid #1e2a45;
      cursor: default;
    }

    .tk-chip-teams {
      font-size: 0.75rem;
      font-weight: 700;
      color: #8aa0c0;
      letter-spacing: 0.04em;
    }

    .tk-chip-teams .chip-abbr { color: #c8d8f0; }
    .tk-chip-teams .chip-sep  { color: #2a3a55; margin: 0 4px; font-weight: 400; }

    .tk-chip-score {
      font-size: 1.05rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    .tk-chip-score .sc-win  { color: #fff; }
    .tk-chip-score .sc-lose { color: #3a5070; }
    .tk-chip-score .sc-sep  { color: #2a3a55; margin: 0 2px; }

    .tk-chip-clock {
      font-size: 0.6rem;
      color: #4a6080;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .tk-chip.chip-live .tk-chip-clock { color: var(--live); }

    .tk-chip.chip-upset .tk-chip-score .sc-win { color: var(--gold); }
    .tk-chip.chip-upset .tk-chip-teams .chip-abbr { color: var(--gold); }

    /* Upcoming band */
    .tk-up-band {
      overflow: hidden;
      background: #0a0e1a;
      border-bottom: 1px solid #1e2a45;
      min-height: 40px;
      display: flex;
      align-items: center;
    }

    .tk-up-label {
      background: var(--blue2);
      color: #fff;
      font-size: 0.62rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 10px;
      height: 100%;
      min-height: 40px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tk-up-scroll-track {
      flex: 1;
      overflow: hidden;
      height: 100%;
      min-height: 40px;
      display: flex;
      align-items: center;
    }

    .tk-up-scroll-inner {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      animation: tk-scroll 60s linear infinite;
    }

    .tk-up-scroll-inner:hover { animation-play-state: paused; }

    .tk-up-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 18px;
      border-right: 1px solid #1e2a45;
      font-size: 0.68rem;
    }

    .tk-up-chip .uc-teams { color: #8aa0c0; font-weight: 600; }
    .tk-up-chip .uc-teams .chip-abbr { color: #c8d8f0; }
    .tk-up-chip .uc-teams .chip-sep  { color: #2a3a55; margin: 0 3px; }
    .tk-up-chip .uc-time  { color: #4a6080; font-size: 0.6rem; }

    .uc-odds {
      display: inline-flex;
      gap: 3px;
    }

    .uc-pill {
      font-size: 0.55rem;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 2px;
      white-space: nowrap;
    }

    .uc-pill.spread { background: #1e3a5f; color: #7ab0ff; }
    .uc-pill.ml     { background: #1a2a1a; color: #5adf7a; }
    .uc-pill.total  { background: #3a1a00; color: #ff9a3c; }

    /* API key config strip */
    .tk-key-strip {
      background: #0f1520;
      border-top: 1px solid #1e2a45;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.62rem;
      color: #4a6080;
      flex-shrink: 0;
    }

    .tk-key-strip a { color: var(--gold); text-decoration: none; }

    .tk-key-input {
      flex: 1;
      max-width: 240px;
      font-size: 0.62rem;
      padding: 2px 6px;
      background: #1a2535;
      border: 1px solid #2a3a55;
      border-radius: 3px;
      color: #c8d8f0;
    }

    .tk-key-btn {
      font-size: 0.62rem;
      padding: 2px 8px;
      background: var(--blue2);
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }

    .tk-key-ok { color: #5adf7a; font-size: 0.62rem; }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: var(--blue2);
      border-bottom: 3px solid var(--gold);
    }

    .tab {
      flex: 1;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      padding: 7px 4px;
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -3px;
      transition: color 0.15s, background 0.15s;
    }

    .tab:hover { color: #fff; }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    .tab .n {
      font-size: 0.6rem;
      opacity: 0.7;
      margin-left: 3px;
    }

    /* ── SECTION ── */
    .section-label {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #fff;
      background: var(--orange);
      padding: 4px 10px;
      grid-column: 1 / -1;
    }

    /* ── GRID WRAPPER ── */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
      padding: 6px;
    }

    /* ── GAME CARD ── */
    .game {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background 0.15s;
    }

    .game:hover { background: var(--card-hover); }

    .game.live     { border-color: var(--live); background: var(--live-bg); }
    .game.final    { border-top: 2px solid var(--final); }
    .game.upcoming { border-top: 2px solid var(--blue2); }

    .game.upset {
      border-color: var(--gold) !important;
      animation: upset-glow 2.5s ease-in-out infinite;
    }

    @keyframes upset-glow {
      0%, 100% { box-shadow: 0 0 0 1px rgba(249,168,37,0.5); }
      50%       { box-shadow: 0 0 6px 2px rgba(249,168,37,0.2); }
    }

    /* teams section */
    .game-teams {
      padding: 6px 8px 4px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .round-tag {
      font-size: 0.52rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .logo {
      width: 16px; height: 16px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .logo-abbr {
      width: 16px; height: 16px;
      background: var(--border);
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.42rem; font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
    }

    .seed-badge {
      font-size: 0.5rem;
      font-weight: 800;
      padding: 1px 4px;
      border-radius: 3px;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .seed-ncaa {
      background: var(--blue);
      color: #fff;
    }


.team-name {
      flex: 1;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .team-score {
      font-size: 1rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      min-width: 24px;
      text-align: right;
      color: var(--blue);
      flex-shrink: 0;
    }

    .team-row.winning .team-name  { color: var(--text); font-weight: 700; }
    .team-row.winning .team-score { color: var(--blue); }
    .team-row.losing  .team-name  { color: var(--muted); font-weight: 400; }
    .team-row.losing  .team-score { color: var(--final); }

    .divider-row {
      height: 1px;
      background: var(--border);
      margin: 2px 0;
    }

    /* bottom status bar */
    .game-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border-top: 1px solid var(--border);
      padding: 3px 6px;
      background: #eef2ff;
    }

    .status-label {
      font-size: 0.58rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .status-label.live     { color: var(--live); }
    .status-label.final    { color: var(--final); }
    .status-label.upcoming { color: var(--blue2); }

    .status-label.live::before {
      content: '';
      width: 5px; height: 5px;
      background: var(--live);
      border-radius: 50%;
      flex-shrink: 0;
      animation: blink 1.2s ease-in-out infinite;
    }

    .status-clock {
      font-size: 0.58rem;
      color: var(--muted);
    }

    .tv-tag {
      font-size: 0.52rem;
      color: var(--muted);
      background: var(--border);
      padding: 1px 4px;
      border-radius: 2px;
      margin-left: auto;
    }

    /* ── STATES ── */
    .empty {
      text-align: center;
      padding: 40px 16px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 30px auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="brand">🏀 <span>March</span> Madness</div>
  <div class="header-right">
    <div class="live-pill" id="live-pill" style="display:none">
      <div class="live-dot"></div>
      <span id="live-count">0</span> Live
    </div>
    <button class="refresh-btn" onclick="manualRefresh()">↻</button>
    <span class="countdown" id="cd">20s</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" id="tab-all"      onclick="setTab('all')">All<span class="n" id="n-all"></span></button>
  <button class="tab"        id="tab-live"     onclick="setTab('live')">Live<span class="n" id="n-live"></span></button>
  <button class="tab"        id="tab-final"    onclick="setTab('final')">Final<span class="n" id="n-final"></span></button>
  <button class="tab"        id="tab-upcoming" onclick="setTab('upcoming')">Soon<span class="n" id="n-upcoming"></span></button>
  <button class="tab"        id="tab-ticker"   onclick="setTab('ticker')">Ticker</button>
</div>

<div id="ticker-view"></div>

<div id="content">
  <div class="spinner"></div>
  <div class="empty">Loading…</div>
</div>

<script>
  let games = [], dkOdds = {}, tab = 'all', cd = 20, timer;
  const ODDS_KEY_STORE = 'mm_odds_api_key';
  let oddsApiKey = localStorage.getItem(ODDS_KEY_STORE) || '';

  // Conference tournament seeds — static for the tournament
  const CONF_SEEDS = {
    // ACC
    'Duke':1,'Virginia':2,'Miami':3,'North Carolina':4,'UNC':4,'Clemson':5,
    'Louisville':6,'NC State':7,'Florida St':8,'Florida State':8,'Cal':9,'California':9,
    'Stanford':10,'SMU':11,'Virginia Tech':12,'Va Tech':12,'Wake Forest':13,
    'Syracuse':14,'Pitt':15,'Pittsburgh':15,'Notre Dame':16,'Boston College':17,'Boston Col':17,
    'Georgia Tech':18,
    // Big Ten
    'Michigan':1,'Illinois':2,'Michigan St':3,'Michigan State':3,'Nebraska':4,'Wisconsin':5,
    'Purdue':6,'UCLA':7,'Ohio St':8,'Ohio State':8,'Iowa':9,'Indiana':10,'Minnesota':11,
    'USC':12,'Washington':13,'Rutgers':14,'Northwestern':15,'Oregon':16,'Maryland':17,
    'Penn St':18,'Penn State':18,
    // Big 12
    'Arizona':1,'Houston':2,'Kansas':3,'Texas Tech':4,'Iowa St':5,'Iowa State':5,
    'TCU':6,'West Virginia':7,'WVU':7,'UCF':8,'Cincinnati':9,'BYU':10,'Colorado':11,
    'Arizona St':12,'Arizona State':12,'Baylor':13,'Oklahoma St':14,'Oklahoma State':14,
    'Kansas St':15,'Kansas State':15,'Utah':16,
    // Big East
    "St. John's":1,'UConn':2,'Connecticut':2,'Villanova':3,'Seton Hall':4,'Creighton':5,
    'DePaul':6,'Marquette':7,'Butler':8,'Providence':9,'Xavier':10,'Georgetown':11,
    // SEC
    'Florida':1,'Alabama':2,'Arkansas':3,'Vanderbilt':4,'Tennessee':5,'Texas A&M':6,
    'Georgia':7,'Missouri':8,'Kentucky':9,'Texas':10,'Oklahoma':11,'Auburn':12,
    'Mississippi St':13,'Mississippi State':13,'Miss State':13,'South Carolina':14,
    'S Carolina':14,'Ole Miss':15,'LSU':16,
  };

  function getSeed(competitor) {
    if (competitor.seed) return parseInt(competitor.seed);
    const name = competitor.team?.shortDisplayName || competitor.team?.name || '';
    return CONF_SEEDS[name] || null;
  }

  const statusOf = e => {
    const n = e.status?.type?.name || '';
    if (n === 'STATUS_IN_PROGRESS' || n === 'STATUS_HALFTIME') return 'live';
    if (n.startsWith('STATUS_FINAL')) return 'final';
    return 'upcoming';
  };

  const clockOf = e => {
    const t = e.status?.type;
    const n = t?.name || '';
    if (n === 'STATUS_HALFTIME') return 'Half';
    if (n === 'STATUS_IN_PROGRESS') return t?.shortDetail || t?.detail || 'Live';
    if (n.startsWith('STATUS_FINAL')) return 'Final';
    if (e.date) return new Date(e.date).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
    return t?.description || '';
  };

  const roundOf = e => {
    for (const n of e.competitions?.[0]?.notes || [])
      if (n.headline) return n.headline;
    return '';
  };

  const tvOf = e => {
    const bc = e.competitions?.[0]?.broadcasts;
    if (Array.isArray(bc) && bc[0]) {
      const b = bc[0];
      return b.names?.[0] || b.media?.shortName || (typeof b === 'string' ? b : null);
    }
    return null;
  };

  function buildGame(e) {
    const comp = e.competitions?.[0];
    if (!comp) return '';
    const status = statusOf(e);
    const clock  = clockOf(e);
    const round  = roundOf(e);
    const tv     = tvOf(e);

    const comps = comp.competitors || [];
    const away  = comps.find(c => c.homeAway === 'away') || comps[0];
    const home  = comps.find(c => c.homeAway === 'home') || comps[1];
    if (!away || !home) return '';

    const aScore = parseInt(away.score) || 0;
    const hScore = parseInt(home.score) || 0;
    const showW  = status !== 'upcoming';
    const aWin   = showW && aScore > hScore;
    const hWin   = showW && hScore > aScore;

    // Upset: higher seed number (worse team) currently leading a live game
    const aSeed = getSeed(away);
    const hSeed = getSeed(home);
    const seedsValid = aSeed && hSeed && aScore !== hScore;
    const isUpset = status === 'live' && seedsValid &&
      ((aWin && aSeed > hSeed) || (hWin && hSeed > aSeed));

    const teamHtml = (t, score, win, lose) => {
      const logo = t.team?.logo;
      const abbr = t.team?.abbreviation || '?';
      const name = t.team?.shortDisplayName || t.team?.name || abbr;
      const scoreStr = status === 'upcoming' ? '' : score;
      const cls = !showW ? '' : win ? 'winning' : 'losing';
      const logoEl = logo
        ? `<img class="logo" src="${logo}" alt="${abbr}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="logo-abbr" style="display:none">${abbr}</div>`
        : `<div class="logo-abbr">${abbr}</div>`;

      // Show tournament seed number (conference lookup or NCAA seed)
      const seed = getSeed(t);
      const seedBadge = seed ? `<span class="seed-badge seed-ncaa">${seed}</span>` : '';

      return `<div class="team-row ${cls}">${logoEl}${seedBadge}<span class="team-name">${name}</span><span class="team-score">${scoreStr}</span></div>`;
    };

    // clock display
    let clockTop = status === 'live' ? 'Live' : status === 'final' ? 'Final' : 'Soon';
    let clockBot = '';
    if (status === 'live' && clock !== 'Live') clockBot = clock;
    else if (status === 'upcoming') clockBot = clock;

    return `
      <div class="game ${status}${isUpset ? ' upset' : ''}">
        <div class="game-teams">
          ${round ? `<div class="round-tag">${round}</div>` : ''}
          ${teamHtml(away, aScore, aWin, hWin)}
          <div class="divider-row"></div>
          ${teamHtml(home, hScore, hWin, aWin)}
        </div>
        <div class="game-status">
          <div class="status-label ${status}">${clockTop}</div>
          ${clockBot ? `<span class="status-clock">${clockBot}</span>` : ''}
          ${tv ? `<span class="tv-tag">${tv}</span>` : ''}
        </div>
      </div>`;
  }

  function render() {
    const live     = games.filter(e => statusOf(e) === 'live');
    const final    = games.filter(e => statusOf(e) === 'final');
    const upcoming = games.filter(e => statusOf(e) === 'upcoming');

    document.getElementById('n-all').textContent      = games.length ? ` ${games.length}` : '';
    document.getElementById('n-live').textContent     = live.length     ? ` ${live.length}` : '';
    document.getElementById('n-final').textContent    = final.length    ? ` ${final.length}` : '';
    document.getElementById('n-upcoming').textContent = upcoming.length ? ` ${upcoming.length}` : '';

    const pill = document.getElementById('live-pill');
    if (live.length) { pill.style.display='flex'; document.getElementById('live-count').textContent=live.length; }
    else pill.style.display='none';

    let filtered;
    if      (tab === 'live')     filtered = live;
    else if (tab === 'final')    filtered = final;
    else if (tab === 'upcoming') filtered = upcoming;
    else                         filtered = games;

    if (!filtered.length) {
      document.getElementById('content').innerHTML =
        `<div class="empty">${games.length ? 'No games in this category' : 'No games right now'}</div>`;
      return;
    }

    const grid = games => `<div class="games-grid">${games.map(buildGame).join('')}</div>`;

    let html = '';
    if (tab === 'all') {
      if (live.length)     html += `<div class="section-label">Live Now</div>${grid(live)}`;
      if (upcoming.length) html += `<div class="section-label">Upcoming</div>${grid(upcoming)}`;
      if (final.length)    html += `<div class="section-label">Final</div>${grid(final)}`;
    } else {
      html = grid(filtered);
    }

    document.getElementById('content').innerHTML = html;
    if (tab === 'ticker') renderTicker();
  }

  async function fetchDkOdds() {
    if (!oddsApiKey) return;
    try {
      const r = await fetch(
        `https://api.the-odds-api.com/v4/sports/basketball_ncaab/odds?regions=us&markets=h2h,spreads,totals&oddsFormat=american&bookmakers=draftkings&apiKey=${oddsApiKey}`,
        { cache: 'no-store' }
      );
      if (!r.ok) return;
      const events = await r.json();
      dkOdds = {};
      for (const ev of events) {
        const dk = ev.bookmakers?.[0];
        if (!dk) continue;
        const markets = {};
        for (const m of dk.markets || []) markets[m.key] = m.outcomes;
        // key by away_team + home_team normalized
        const key = (ev.away_team + '|' + ev.home_team).toLowerCase();
        dkOdds[key] = markets;
      }
    } catch(e) { /* silent */ }
  }

  function getDkLine(away, home) {
    const aName = away.team?.displayName || '';
    const hName = home.team?.displayName || '';
    const key = (aName + '|' + hName).toLowerCase();
    // Try fuzzy match
    const match = Object.keys(dkOdds).find(k => {
      const [a, h] = k.split('|');
      return aName.toLowerCase().includes(a.split(' ').pop()) ||
             hName.toLowerCase().includes(h.split(' ').pop());
    });
    return dkOdds[key] || (match ? dkOdds[match] : null);
  }

  function renderTicker() {
    const live     = games.filter(e => statusOf(e) === 'live');
    const upcoming = games.filter(e => statusOf(e) === 'upcoming');
    const tv = document.getElementById('ticker-view');

    const makeChip = (e, isLive) => {
      const comp  = e.competitions?.[0];
      const comps = comp?.competitors || [];
      const away  = comps.find(c => c.homeAway === 'away') || comps[0];
      const home  = comps.find(c => c.homeAway === 'home') || comps[1];
      if (!away || !home) return '';
      const aAbbr = away.team?.abbreviation || '?';
      const hAbbr = home.team?.abbreviation || '?';
      const aSeed = getSeed(away), hSeed = getSeed(home);
      const aSeedStr = aSeed ? `<sup style="font-size:0.5em;opacity:.7">${aSeed}</sup>` : '';
      const hSeedStr = hSeed ? `<sup style="font-size:0.5em;opacity:.7">${hSeed}</sup>` : '';

      if (isLive) {
        const aScore = parseInt(away.score) || 0;
        const hScore = parseInt(home.score) || 0;
        const aWin = aScore > hScore, hWin = hScore > aScore;
        const seedsValid = aSeed && hSeed && aScore !== hScore;
        const isUpset = seedsValid && ((aWin && aSeed > hSeed) || (hWin && hSeed > aSeed));
        const clock = clockOf(e);
        return `<div class="tk-chip chip-live${isUpset ? ' chip-upset' : ''}">
          <div class="tk-chip-teams">
            <span class="chip-abbr">${aSeedStr}${aAbbr}</span>
            <span class="chip-sep">vs</span>
            <span class="chip-abbr">${hSeedStr}${hAbbr}</span>
          </div>
          <div class="tk-chip-score">
            <span class="${aWin ? 'sc-win' : 'sc-lose'}">${aScore}</span><span class="sc-sep">–</span><span class="${hWin ? 'sc-win' : 'sc-lose'}">${hScore}</span>
          </div>
          <div class="tk-chip-clock">${clock}</div>
        </div>`;
      } else {
        const time = clockOf(e);
        const tv   = tvOf(e) || '';
        return `<div class="tk-up-chip">
          <div class="uc-teams">
            <span class="chip-abbr">${aSeedStr}${aAbbr}</span>
            <span class="chip-sep">@</span>
            <span class="chip-abbr">${hSeedStr}${hAbbr}</span>
          </div>
          <div class="uc-time">${time}${tv ? ' · ' + tv : ''}</div>
        </div>`;
      }
    };

    const liveChips    = live.map(e => makeChip(e, true)).join('');
    const upcomingChips = upcoming.map(e => makeChip(e, false)).join('');

    let html = `
      <div class="tk-header">
        <div class="tk-header-badge">
          ${live.length ? `<div class="tk-hd-dot"></div> ${live.length} Live` : 'No Live Games'}
        </div>
        <div class="tk-header-meta">
          <span class="tk-header-count">${games.length} total games today</span>
        </div>
      </div>`;

    if (live.length) {
      const doubled = liveChips + liveChips;
      html += `
      <div class="tk-band">
        <div class="tk-band-label">🔴 LIVE</div>
        <div class="tk-scroll-track">
          <div class="tk-scroll-inner" style="animation-duration:${Math.max(20, live.length * 6)}s">${doubled}</div>
        </div>
      </div>`;
    }

    if (upcoming.length) {
      const doubled = upcomingChips + upcomingChips;
      html += `
      <div class="tk-up-band">
        <div class="tk-up-label">UPCOMING</div>
        <div class="tk-up-scroll-track">
          <div class="tk-up-scroll-inner" style="animation-duration:${Math.max(30, upcoming.length * 4)}s">${doubled}</div>
        </div>
      </div>`;
    }

    if (!liveChips && !upcomingChips) {
      html += `<div style="color:#4a6080;padding:20px;text-align:center;font-size:0.8rem;">No games right now</div>`;
    }

    tv.innerHTML = html;
  }

  function saveOddsKey() {
    const val = document.getElementById('odds-key-input')?.value?.trim() || '';
    oddsApiKey = val;
    if (val) localStorage.setItem(ODDS_KEY_STORE, val);
    else localStorage.removeItem(ODDS_KEY_STORE);
    fetchDkOdds().then(renderTicker);
  }

  async function fetchScores() {
    try {
      const r = await fetch(
        'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?limit=300&groups=50',
        { cache: 'no-store' }
      );
      if (!r.ok) throw new Error(r.status);
      const d = await r.json();
      games = d.events || [];
      render();
    } catch(err) {
      if (!games.length)
        document.getElementById('content').innerHTML = '<div class="empty">⚠ Could not load scores</div>';
    }
  }

  function manualRefresh() { cd = 20; fetchScores(); }

  function setTab(t) {
    tab = t;
    ['all','live','final','upcoming','ticker'].forEach(x => {
      document.getElementById('tab-'+x).classList.toggle('active', x === t);
    });
    const isTicker = t === 'ticker';
    document.getElementById('ticker-view').style.display = isTicker ? 'block' : 'none';
    document.getElementById('content').style.display     = isTicker ? 'none'  : 'block';
    if (isTicker) renderTicker();
    else render();
  }

  fetchScores();
  fetchDkOdds();
  timer = setInterval(() => {
    cd--;
    document.getElementById('cd').textContent = cd + 's';
    if (cd <= 0) { cd = 20; fetchScores(); }
  }, 1000);
</script>
</body>
</html>
